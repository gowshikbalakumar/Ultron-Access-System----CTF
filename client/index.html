<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ULTRON Secure Access</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <canvas id="matrix"></canvas>

  <div class="container">
    <div class="terminal">
      <h1>ULTRON ACCESS SYSTEM</h1>

      <form id="loginForm">
        <input
          type="email"
          id="email"
          placeholder="Email"
          required
        />

        <input
          type="password"
          id="password"
          placeholder="Password"
          required
        />

        <button type="submit">LOGIN</button>
      </form>

      <p id="message"></p>
    </div>
  </div>

  <script src="/js/matrix.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
